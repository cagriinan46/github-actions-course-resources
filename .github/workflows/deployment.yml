name: Deploy Project
on: [push, workflow-dispatch]
jobs:
  test: 
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Code/02 Basics/02 Starting Project"
      
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
    
  deploy:
    # needs: [test, job2]
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run: 
        working-directory: "Code/02 Basics/02 Starting Project"

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy
        run: echo "Deploying ..."


        